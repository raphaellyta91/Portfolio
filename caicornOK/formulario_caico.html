<!DOCTYPE html>
<html lang="">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario</title>
    <link rel="stylesheet" href="style.css">

    <fieldset>
      
        <legend> Preencha e Marque sua Visita </legend>
</head>
<body>

    <h1>Marque sua Visita é conheça o Pedacinho do Céu - Localizado: CAÍCO RN</h1>

    <form  action="caico.html" method="get">


    <label for="Nome">Nome</label>   
    <input type="text" id="nome" placeholder="Nome completo" 
    required pattern="[a-zA-Z]+" maxlength="100">
    <br><br>

  <Label for = "sexo"> sexo</Label>
  <input type="radio" id="mas"  name= sexo value="Masculino"> Masculino
  <input type="radio" id="fem"  name= sexo value="Feminino"> Feminino
  <input type="radio" id="outr"  name= sexo value="Outros"> Outros <br><br>
   


    <label for="email">E-mail:</label>
    <input type="email" id="email" placeholder="E-mail" required>
    <br><br>

    <label for="tel">Telefone:</label>
    <input type="tel" id="tel" placeholder="(84) 99999-9999" maxlength="11">
    <br><br>

    <label for="data">Data:</label>
    <input type="date">
    <br><br>

    <label for="sensagem">Mensagem:</label><br>
    <textarea name="mensagem" id="mensagem" rows="5" cols="30"></textarea>
    <br><br>

    <input type="submit" value="Enviar">
    <br><br>

    
    <label for="Contagem"></label>
    <input type="number" step="5" min="5" max="100">

</form>
</fieldset>
</body>
</html>
