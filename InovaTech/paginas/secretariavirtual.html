<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secretaria Virtual - Inova Tech</title>

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box; 
}

body {
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
    color: #333;
}

/* HEADER */
header {
    background: linear-gradient(90deg, #0c4a78, #2a86c4);
    color: white;
    text-align: center;
    padding: 30px 20px;
    position: relative;
}

header h1 {
    font-size: 28px;
}

/* BOTÃO VOLTAR */
header a button {
    position: absolute;
    left: 20px;
    top: 30px;
    padding: 10px 15px;
    border: none;
    background-color: white;
    color: #0c4a78;
    border-radius: 8px;
    cursor: pointer;
    font-weight: bold;
}

header a button:hover {
    background-color: #ddd;
}

/* MAIN */
main {
    padding: 40px 20px;
}

/* SEÇÕES */
section {
    background: white;
    margin: 20px auto;
    padding: 25px;
    max-width: 600px;
    border-radius: 12px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.1);
}

section h2 {
    text-align: center;
    margin-bottom: 15px;
}

/* FORMULÁRIOS */
form {
    margin-top: 10px;
}

fieldset {
    border: 2px solid #2a86c4;
    border-radius: 10px;
    padding: 20px;
}

legend {
    font-weight: bold;
    color: #0c4a78;
}

/* INPUTS */
input, textarea, select {
    width: 100%;
    padding: 10px;
    margin-top: 8px;
    border-radius: 6px;
    border: 1px solid #ccc;
}

/* BOTÕES */
button {
    margin-top: 10px;
    padding: 10px 15px;
    border: none;
    border-radius: 6px;
    cursor: pointer;
}

button[type="submit"] {
    background-color: #2a86c4;
    color: white;
}

button[type="submit"]:hover {
    background-color: #1d5f8f;
}

button[type="reset"] {
    background-color: #ccc;
}

button[type="reset"]:hover {
    background-color: #aaa;
}

/* FOOTER */
footer {
    background-color: #0c4a78;
    color: white;
    text-align: center;
    padding: 15px;
    margin-top: 30px;
}

</style>

</head>

<body>

<header>
    <h1>Secretaria Virtual</h1>

    <a href="pagina_principal.html">
        <button>Voltar</button>
    </a>
</header>

<main>

<!-- CONTATO -->
<section>
<h2>Contato</h2>

<form>

<fieldset>
<legend>Fale Conosco</legend>

<input type="text" placeholder="Nome" required>

<input type="email" placeholder="Email" required>

<input type="text" placeholder="Telefone" maxlength="11" required>

<textarea placeholder="Mensagem" rows="4" required></textarea>

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</fieldset>

</form>
</section>

<!-- MATRÍCULA -->
<section>
<h2>Matrícula</h2>

<form>

<fieldset>
<legend>Cadastro</legend>

<input type="text" placeholder="Nome" required>

<input type="text" placeholder="CPF" maxlength="11" required>

<input type="email" placeholder="Email" required>

<select>
<option>Sexo</option>
<option>Masculino</option>
<option>Feminino</option>
</select>

<input type="date">

<select>
<option>Cidade</option>
<option>Natal</option>
<option>Mossoró</option>
</select>

<select>
<option>Estado</option>
<option>RN</option>
<option>CE</option>
</select>

<input type="file">

<button type="submit">Enviar</button>
<button type="reset">Limpar</button>

</fieldset>

</form>

</section>

</main>

<footer>
<p>Inova Tech - Atendimento ao aluno</p>
</footer>

</body>
</html>
